services:
  auth-service:
    build:
      context: ./services/auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-solca-cloud-secret-solca-cloud-secret-solca-cloud-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - auth-data:/data
    ports:
      - "8000:8080"

  paciente-maestro-regional:
    build:
      context: ./services/paciente-maestro-regional
    environment:
      JWT_SECRET: ${JWT_SECRET:-solca-cloud-secret-solca-cloud-secret-solca-cloud-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - paciente-data:/data
    ports:
      - "8001:8080"

  consulta-service:
    build:
      context: ./services/consulta-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-solca-cloud-secret-solca-cloud-secret-solca-cloud-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - consulta-data:/data
    ports:
      - "8002:8080"

  lab-service:
    build:
      context: ./services/lab-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-solca-cloud-secret-solca-cloud-secret-solca-cloud-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - laboratorio-data:/data
    ports:
      - "8003:8080"

  imaginologia-service:
    build:
      context: ./services/imaginologia-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-solca-cloud-secret-solca-cloud-secret-solca-cloud-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - imagenologia-data:/data
    ports:
      - "8004:8080"

  repositorio-service:
    build:
      context: ./services/repositorio-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-solca-cloud-secret-solca-cloud-secret-solca-cloud-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SERVICE_PACIENTES: http://paciente-maestro-regional:8080
      SERVICE_CONSULTAS: http://consulta-service:8080
      SERVICE_LABORATORIOS: http://lab-service:8080
      SERVICE_IMAGENOLOGIA: http://imaginologia-service:8080
    volumes:
      - repositorio-data:/data
    depends_on:
      - paciente-maestro-regional
      - consulta-service
      - lab-service
      - imaginologia-service
    ports:
      - "8005:8080"

volumes:
  auth-data:
  paciente-data:
  consulta-data:
  laboratorio-data:
  imagenologia-data:
  repositorio-data:
