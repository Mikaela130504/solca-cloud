server.port=${PORT:8080}
spring.application.name=Imagenologia
spring.datasource.url=jdbc:sqlite:/data/Imagenologia.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.maximum-pool-size=1
jwt.secret=${JWT_SECRET:solca-cloud-secret-solca-cloud-secret-solca-cloud-secret}
app.cors-origins=${CORS_ORIGINS:http://localhost:5173}
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
